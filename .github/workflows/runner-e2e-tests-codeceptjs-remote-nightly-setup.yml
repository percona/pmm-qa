name: _runner-e2e-tests-codeceptjs-remote-nightly-setup

on:
  workflow_call:
    inputs:
      pmm_server_address:
        required: true
        type: string
      admin_password:
        required: false
        default: 'admin'
        type: string
      pmm_qa_branch:
        required: false
        default: 'main'
        type: string
      pmm_client_version:
        required: false
        default: 'latest-tarball'
        type: string
      pmm_server_image:
        required: false
        default: 'perconalab/pmm-server:3-dev-latest'
        type: string
      setup_services:
        required: true
        type: string
      shard_name:
        required: true
        type: string
      expected_test_jobs:
        required: false
        default: 10
        type: number

permissions:
  actions: read
  contents: read

jobs:
  setup:
    name: "setup / ${{ inputs.shard_name }}"
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      GITHUB_TOKEN: ${{ github.token }}
      ADMIN_PASSWORD: ${{ inputs.admin_password || 'admin' }}
      PMM_SERVER_ADDRESS: ${{ inputs.pmm_server_address }}
      PMM_QA_BRANCH: ${{ inputs.pmm_qa_branch || 'main' }}
      PMM_QA_GIT_BRANCH: ${{ inputs.pmm_qa_branch || 'main' }}
      PMM_CLIENT_VERSION: ${{ inputs.pmm_client_version || 'latest-tarball' }}
      CLIENT_VERSION: ${{ inputs.pmm_client_version || 'latest-tarball' }}
      DOCKER_VERSION: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      WIZARD_ARGS: ${{ inputs.setup_services }}
      SHARD_NAME: ${{ inputs.shard_name }}
      TEST_JOB_PREFIX: 'test execution / '
      EXPECTED_TEST_JOBS: ${{ inputs.expected_test_jobs || 10 }}
      WAIT_POLL_INTERVAL_SECONDS: 30
      WAIT_TIMEOUT_SECONDS: 10800

    steps:
      - name: Checkout pmm-qa repo
        uses: actions/checkout@v4
        with:
          repository: percona/pmm-qa
          ref: ${{ env.PMM_QA_BRANCH }}
          path: ./pmm-qa

      - name: Cleanup disk space on a worker according to https://github.com/actions/runner-images/issues/2840#issuecomment-790492173
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Resolve PMM Server URLs
        id: pmm_urls
        run: |
          ADDR="${{ env.PMM_SERVER_ADDRESS }}"
          ADDR_NO_SCHEME=${ADDR#http://}
          ADDR_NO_SCHEME=${ADDR_NO_SCHEME#https://}
          ADDR_NO_SCHEME=${ADDR_NO_SCHEME%/}
          echo "PMM_UI_URL=https://${ADDR_NO_SCHEME}/" >> "$GITHUB_ENV"
          echo "PMM_URL=https://admin:${{ env.ADMIN_PASSWORD }}@${ADDR_NO_SCHEME}" >> "$GITHUB_ENV"
          echo "SERVER_IP=${ADDR_NO_SCHEME}" >> "$GITHUB_ENV"

      - name: Sanity check remote PMM Server reachability
        run: |
          set -eux
          for i in $(seq 1 30); do
            code=$(curl -ksS -o /dev/null -w "%{http_code}" "https://${SERVER_IP}/v1/server/readyz" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Remote PMM Server is ready"
              exit 0
            fi
            echo "Attempt $i: PMM Server not ready (http=$code), sleeping 5s"
            sleep 5
          done
          echo "Remote PMM Server did not become ready in time" >&2
          exit 1

      - name: Export path to qa-integration repo
        working-directory: pmm-qa/qa-integration
        run: echo "PATH_TO_PMM_QA=$(pwd)" >> $GITHUB_ENV

      - name: Setup PMM-Client against remote PMM Server
        working-directory: pmm-qa/qa-integration/pmm_qa
        run: |
          sudo bash -x pmm3-client-setup.sh \
            --pmm_server_ip "${SERVER_IP}" \
            --client_version "${{ env.PMM_CLIENT_VERSION }}" \
            --admin_password "${{ env.ADMIN_PASSWORD }}" \
            --use_metrics_mode no

      - name: Run setup for E2E tests (start client services on this runner)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          retry_wait_seconds: '10'
          max_attempts: 2
          retry_on: 'error'
          command: |
            cd pmm-qa/qa-integration/pmm_qa
            mkdir -m 777 -p /tmp/backup_data || true
            python3 -m venv virtenv
            . virtenv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            pip install setuptools
            python pmm-framework.py \
              --pmm-server-ip "${SERVER_IP}" \
              --pmm-server-password "${{ env.ADMIN_PASSWORD }}" \
              --client-version "${{ env.PMM_CLIENT_VERSION }}" \
              --verbose \
              ${{ env.WIZARD_ARGS }}
          on_retry_command: |
            docker rm -f $(docker ps -q) || true
            docker volume rm $(docker volume ls -q) || true
            docker network rm $(docker network ls -q) || true

      - name: Waiting for tests execution
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run_id = context.runId;
            const expectedTestJobs = Number(process.env.EXPECTED_TEST_JOBS);
            const pollIntervalMs = Number(process.env.WAIT_POLL_INTERVAL_SECONDS) * 1000;
            const timeoutMs = Number(process.env.WAIT_TIMEOUT_SECONDS) * 1000;
            const testPrefix = process.env.TEST_JOB_PREFIX;
            const startedAt = Date.now();

            async function sleep(ms) {
              return new Promise((resolve) => setTimeout(resolve, ms));
            }

            async function listJobs() {
              return github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                owner,
                repo,
                run_id,
                filter: 'latest',
                per_page: 100,
                headers: {
                  'X-GitHub-Api-Version': '2026-03-10',
                },
              });
            }

            async function getJob(job) {
              const response = await github.rest.actions.getJobForWorkflowRun({
                owner,
                repo,
                job_id: job.id,
                headers: {
                  'X-GitHub-Api-Version': '2026-03-10',
                },
              });
              return response.data;
            }

            while (true) {
              const jobs = await listJobs();
              const testJobs = jobs.filter((job) => job.name.startsWith(testPrefix) || job.name.includes(testPrefix));
              const detailedTestJobs = await Promise.all(testJobs.map(getJob));
              const executableTestJobs = detailedTestJobs.filter((job) => Array.isArray(job.steps) && job.steps.length > 0);
              const completedTestJobs = executableTestJobs.filter((job) => job.status === 'completed');

              core.info(`Test execution jobs: discovered=${executableTestJobs.length}/${expectedTestJobs}, completed=${completedTestJobs.length}/${expectedTestJobs}`);
              for (const job of executableTestJobs) {
                core.info(`- ${job.name}: status=${job.status}, conclusion=${job.conclusion || 'null'}`);
              }

              if (executableTestJobs.length >= expectedTestJobs && completedTestJobs.length >= expectedTestJobs) {
                core.info('All test execution jobs completed.');
                return;
              }

              if (Date.now() - startedAt > timeoutMs) {
                throw new Error(`Timed out waiting for ${expectedTestJobs} test execution jobs to complete.`);
              }

              await sleep(pollIntervalMs);
            }
