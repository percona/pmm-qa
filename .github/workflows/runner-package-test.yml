---
name: runner-package-test

on:
  workflow_dispatch:
    inputs:
      package_testing_branch:
        description: "Target branch for package-testing repository"
        type: string
        default: "master"
        required: true
      pmm_server_image:
        description: "pmm-server docker image(auto detected if empty)"
        required: false
        type: string
        default: "perconalab/pmm-server:3-dev-latest"
      pmm_client_tarball:
        description: "PMM Client tarball link or FB-code"
        type: string
      expected_version:
        description: "expected version"
        required: false
        type: string
      package:
        description: "package for enabling repo"
        required: true
        default: "pmm3-client"
        type: choice
        options:
          - original
          - pmm3-client
          - tools
      repository:
        description: "Select Repo to install PMM Client:"
        required: true
        default: "dev-latest"
        type: choice
        options:
          - release
          - release candidate
          - dev-latest
      metrics_mode:
        description: "Select the Metrics Mode for PMM Client:"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - push
          - pull
      playbook:
        description: "Playbook file to run(without extension)"
        type: string
        default: "pmm3-client_integration"
        required: true
      test_name:
        description: "Optional pretty test name"
        type: string
        required: false
      os:
        description: "Select OS to run test in:"
        required: true
        default: "jammy"
        type: choice
        options:
          - bullseye
          - bookworm
          - noble
          - jammy
          - focal
          - ol-8
          - ol-9
          - ol-10
          - al2023

  workflow_call:
    inputs:
      package_testing_branch:
        type: string
        default: "master"
        required: true
      pmm_server_image:
        required: false
        type: string
      pmm_client_tarball:
        required: false
        type: string
      expected_version:
        required: false
        type: string
      package:
        required: true
        default: "pmm3-client"
        type: string
      repository:
        required: true
        default: "dev-latest"
        type: string
      metrics_mode:
        required: true
        default: "auto"
        type: string
      playbook:
        type: string
        default: "pmm3-client_integration"
        required: true
      test_name:
        type: string
        required: false
      os:
        description: "Select OS to run test in:"
        required: true
        default: "jammy"
        type: string
      sha:
        description: "SHA (leave empty if running manually, default - 'null')"
        required: false
        type: string

jobs:
  test:
    name: ${{ inputs.test_name || inputs.playbook}}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SHA: ${{ inputs.sha || 'null' }}
      PACKAGE_TESTING_BRANCH: ${{ inputs.package_testing_branch || 'master' }}
      PMM_SERVER_IMAGE: ${{ inputs.pmm_server_image }}
      TARBALL_LINK: ${{ inputs.pmm_client_tarball || 'null' }}
      EXPECTED_VERSION: ${{ inputs.expected_version }}

      REPO: ${{ inputs.repository || 'dev-latest' }}
      INSTALL_PACKAGE: ${{ inputs.package || 'pmm3-client' }}
      METRICS_MODE: ${{ inputs.metrics_mode || 'auto' }}
      PLAYBOOK: ${{ inputs.playbook }}
      VERBOSE: "no"

    steps:
      - name: "Create status check"
        if: ${{ env.SHA != 'null' }}
        uses: percona/gh-action-github-status-action@v1
        continue-on-error: true
        with:
          authToken: ${{ secrets.GITHUB_TOKEN }}
          context: "${{ inputs.test_name }} Package test"
          description: "Test execution ${{ job.status }}"
          state: "pending"
          repository: ${{ github.repository }}
          target_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          sha: ${{ env.SHA }}

      - name: 'Checkout package-testing: "${{ inputs.package_testing_branch }}"'
        uses: actions/checkout@v4
        with:
          repository: Percona-QA/package-testing
          ref: ${{ inputs.package_testing_branch }}

      - name: Cleanup disk space on a worker according to https://github.com/actions/runner-images/issues/2840#issuecomment-790492173
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: 'Convert choices'
        run: |
          ### pmm-server docker image ###
          if [[ -z "${{ env.PMM_SERVER_IMAGE }}" ]]; then
            if [[ "${{ inputs.repository }}" = "dev-latest" ]]; then
              echo "PMM_SERVER_IMAGE=perconalab/pmm-server:3-dev-latest" >> $GITHUB_ENV
            fi
            if [[ "${{ inputs.repository }}" =~ "candidate" ]]; then
              rc_latest=$(wget -q "https://registry.hub.docker.com/v2/repositories/perconalab/pmm-client/tags?page_size=25&name=rc" -O - | jq -r .results[].name  | grep 3.*.*-rc$ | sort -V | tail -n1)
              echo "PMM_SERVER_IMAGE=perconalab/pmm-server:$rc_latest" >> $GITHUB_ENV
            fi
            if [[ "${{ inputs.repository }}" = "release" ]]; then
              r_latest=$(wget -q https://registry.hub.docker.com/v2/repositories/percona/pmm-client/tags -O - | jq -r .results[].name  | grep -v latest | sort -V | tail -n1)
              echo "PMM_SERVER_IMAGE=percona/pmm-server:$r_latest" >> $GITHUB_ENV
            fi
          fi
          echo "${{ env.PMM_SERVER_IMAGE }}"
          
          ### pmm2-client repository ### 
          if [[ "${{ inputs.repository }}" = "dev-latest" ]]; then
            echo "REPO=experimental" >> $GITHUB_ENV
          fi
          if [[ "${{ inputs.repository }}" =~ "candidate" ]]; then
            echo "REPO=testing" >> $GITHUB_ENV
            echo "EXPECTED_VERSION=$(echo ${{ inputs.expected_version }} | awk -F'-' '{print $1}')" >> $GITHUB_ENV
            echo "expected version is ${{ env.EXPECTED_VERSION }}"
          fi
          if [[ "${{ inputs.expected_version}}" = "3-dev-latest" ]]; then
            DEV_VERSION=$(wget -q https://raw.githubusercontent.com/Percona-Lab/pmm-submodules/v3/VERSION -O -)
            echo "EXPECTED_VERSION=$DEV_VERSION" >> $GITHUB_ENV
          elif [[ "${{ inputs.expected_version}}" = "pmm3-rc" ]]; then
            RC_VERSION=$(wget -q "https://registry.hub.docker.com/v2/repositories/perconalab/pmm-client/tags?page_size=25&name=rc" -O - | jq -r .results[].name  | grep 3.*.*-rc$ | sort -V | tail -n1)
            echo "EXPECTED_VERSION=$RC_VERSION" >> $GITHUB_ENV
          fi
                    
          echo "repo=${{ env.REPO }}"
          
          ### vagrant vm ###
          if [[ "${{ inputs.os }}" =~ "bullseye" ]]; then
            echo "DOCKER_IMAGE=antmelekhin/docker-systemd:debian-11" >> $GITHUB_ENV
          fi
          if [[ "${{ inputs.os }}" =~ "bookworm" ]]; then
            echo "DOCKER_IMAGE=antmelekhin/docker-systemd:debian-12" >> $GITHUB_ENV
          fi 
          if [[ "${{ inputs.os }}" =~ "jammy" ]]; then
            echo "DOCKER_IMAGE=antmelekhin/docker-systemd:ubuntu-22.04" >> $GITHUB_ENV
          fi
          if [[ "${{ inputs.os }}" =~ "noble" ]]; then
            echo "DOCKER_IMAGE=antmelekhin/docker-systemd:ubuntu-24.04" >> $GITHUB_ENV
          fi
          if [[ "${{ inputs.os }}" =~ "ol-8" ]]; then
            echo "DOCKER_IMAGE=antmelekhin/docker-systemd:rockylinux-8" >> $GITHUB_ENV
            echo "VM_BOX=generic/oracle8" >> $GITHUB_ENV
          fi
          if [[ "${{ inputs.os }}" =~ "ol-9" ]]; then
            echo "DOCKER_IMAGE=antmelekhin/docker-systemd:rockylinux-9" >> $GITHUB_ENV
          fi
          if [[ "${{ inputs.os }}" =~ "ol-10" ]]; then
            echo "DOCKER_IMAGE=antmelekhin/docker-systemd:rockylinux-10" >> $GITHUB_ENV
          fi
          if [[ "${{ inputs.os }}" =~ "al2023" ]]; then
          echo "DOCKER_IMAGE=antmelekhin/docker-systemd:amazonlinux-2023" >> $GITHUB_ENV
          fi
          echo "${{ env.DOCKER_IMAGE }}"
          
      - name: 'Setup "${{ env.PMM_SERVER_IMAGE }}"'
        run: |
          docker network create pmm-qa || true
          docker create -v /srv --name pmm-server-data ${{ env.PMM_SERVER_IMAGE }}
          docker run -d -e PMM_ENABLE_NOMAD=1 -e PMM_ENABLE_INTERNAL_PG_QAN=1 -e PMM_PUBLIC_ADDRESS=127.0.0.1  -p 80:8080 -p 443:8443 -p 9000:9000 -p 4647:4647 \
            --network pmm-qa --volumes-from pmm-server-data --name pmm-server --restart always ${{ env.PMM_SERVER_IMAGE }}

      - name: "Start Containers for package tests"
        run: |
          sudo docker run -d \
            --name=package-tests-runner \
            --restart=always \
            --network pmm-qa \
            --privileged --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            -v /var/lib/containerd \
              ${{ env.DOCKER_IMAGE }}

      - name: "Setup tools"
        run: |
          DISTRIBUTION=$(sudo docker exec -u root package-tests-runner cat /proc/version)
          echo "$DISTRIBUTION"
          if [[ "${DISTRIBUTION}" =~ "Debian" ]]; then
            sudo docker exec -u root package-tests-runner apt-get update
            sudo docker exec -u root package-tests-runner apt-get install -y apt-transport-https ca-certificates ansible
          elif [[ "${DISTRIBUTION}" =~ "Ubuntu" ]]; then
            sudo docker exec -u root package-tests-runner apt-get update
            sudo docker exec -u root package-tests-runner apt-get install -y apt-transport-https ca-certificates ansible
          elif [[ "$DISTRIBUTION" == *"Red Hat"* ]]; then
          fi
          

      - name: "Wait for PMM Server to be healthy"
        run: |
          timeout 240 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' http://127.0.0.1/v1/readyz)" != "200" ]]; do sleep 2; done' || false

      - name: "Run (${{ contains(env.TARBALL, 'PR-') && 'feature build' || inputs.repository }})${{ inputs.playbook }} test on ${{ inputs.os }}"
        working-directory: ./
        run: |
          sudo docker cp ./ package-tests-runner:/
          sudo docker exec -u root package-tests-runner ls
          sudo docker exec -u root package-tests-runner ansible-playbook -vv --connection=local --inventory 127.0.0.1, --limit 127.0.0.1 ${{ env.PLAYBOOK }}.yml

      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: pmm-summary-${{inputs.os}}-${{ inputs.playbook }}
          path: |
            ${{ github.workspace }}/pmm-summary.zip

      - name: "Create status check"
        uses: percona/gh-action-github-status-action@v1
        if: ${{ env.SHA != 'null' && always() }}
        continue-on-error: true
        with:
          authToken: ${{ secrets.GITHUB_TOKEN }}
          context: "${{ inputs.test_name }} Package test"
          description: "Test execution ${{ job.status }}"
          state: ${{ job.status }}
          repository: ${{ github.repository }}
          target_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          sha: ${{ env.SHA }}
