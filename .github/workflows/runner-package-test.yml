---
name: runner-package-test

on:
  workflow_dispatch:
    inputs:
      package_testing_branch:
        description: "Target branch for package-testing repository"
        type: string
        default: "master"
        required: true
      pmm_server_image:
        description: "pmm-server docker image(auto detected if empty)"
        required: false
        type: string
        default: "perconalab/pmm-server:3-dev-latest"
      pmm_client_tarball:
        description: "PMM Client tarball link or FB-code"
        type: string
      expected_version:
        description: "expected version"
        required: false
        type: string
      package:
        description: "package for enabling repo"
        required: true
        default: "pmm3-client"
        type: choice
        options:
          - original
          - pmm3-client
          - tools
      repository:
        description: "Select Repo to install PMM Client:"
        required: true
        default: "dev-latest"
        type: choice
        options:
          - release
          - release candidate
          - dev-latest
      metrics_mode:
        description: "Select the Metrics Mode for PMM Client:"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - push
          - pull
      playbook:
        description: "Playbook file to run(without extension)"
        type: string
        default: "pmm3-client_integration"
        required: true
      test_name:
        description: "Optional pretty test name"
        type: string
        required: false
      os:
        description: "Select OS to run test in:"
        required: true
        default: "jammy"
        type: choice
        options:
          - Debian 11 (bullseye)
          - Debian 12 (bookworm)
          - Debian 13 (trixie)
          - Ubuntu 22.04 (jammy)
          - Ubuntu 24.04 (noble)
          - Oracle Linux 8 (ol-8)
          - Oracle Linux 9 (ol-9)
          - Oracle Linux 10 (ol-10)
          - Amazon Linux 2023 (al2023)

  workflow_call:
    inputs:
      package_testing_branch:
        type: string
        default: "master"
        required: true
      pmm_server_image:
        required: false
        type: string
      pmm_client_tarball:
        required: false
        type: string
      expected_version:
        required: false
        type: string
      package:
        required: true
        default: "pmm3-client"
        type: string
      repository:
        required: true
        default: "dev-latest"
        type: string
      metrics_mode:
        required: true
        default: "auto"
        type: string
      playbook:
        type: string
        default: "pmm3-client_integration"
        required: true
      test_name:
        type: string
        required: false
      os:
        description: "Select OS to run test in:"
        required: true
        default: "jammy"
        type: string
      sha:
        description: "SHA (leave empty if running manually, default - 'null')"
        required: false
        type: string

jobs:
  test:
    name: ${{ inputs.test_name || inputs.playbook}}
    container:
      image: >-
        ${{ fromJSON('{
          "Debian 11 (bullseye)":"antmelekhin/docker-systemd:debian-11",
          "Debian 12 (bookworm)":"antmelekhin/docker-systemd:debian-12",
          "Debian 13 (trixie)":"antmelekhin/docker-systemd:debian-13",
          "Ubuntu 22.04 (jammy)":"antmelekhin/docker-systemd:ubuntu-22.04",
          "Ubuntu 24.04 (noble)":"antmelekhin/docker-systemd:ubuntu-24.04",
          "Oracle Linux 8 (ol-8)":"antmelekhin/docker-systemd:rockylinux-8",
          "Oracle Linux 9 (ol-9)":"antmelekhin/docker-systemd:rockylinux-9",
          "Oracle Linux 10 (ol-10)":"antmelekhin/docker-systemd:rockylinux-10",
          "Amazon Linux 2023 (al2023)":"antmelekhin/docker-systemd:amazonlinux-2023"
        }')[inputs.os] }}
      env:
        PATH: /usr/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/github/home/.local/bin
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    runs-on: percona-runners
    timeout-minutes: 60
    env:
      SHA: ${{ inputs.sha || 'null' }}
      PACKAGE_TESTING_BRANCH: ${{ inputs.package_testing_branch || 'master' }}
      PMM_SERVER_IMAGE: ${{ inputs.pmm_server_image }}
      TARBALL_LINK: ${{ inputs.pmm_client_tarball || 'null' }}
      EXPECTED_VERSION: ${{ inputs.expected_version }}

      REPO: ${{ inputs.repository || 'dev-latest' }}
      INSTALL_PACKAGE: ${{ inputs.package || 'pmm3-client' }}
      METRICS_MODE: ${{ inputs.metrics_mode || 'auto' }}
      PLAYBOOK: ${{ inputs.playbook }}
      VERBOSE: "no"

    steps:
      - name: "Create status check"
        if: ${{ env.SHA != 'null' }}
        uses: percona/gh-action-github-status-action@v1
        continue-on-error: true
        with:
          authToken: ${{ secrets.GITHUB_TOKEN }}
          context: "${{ inputs.test_name }} Package test"
          description: "Test execution ${{ job.status }}"
          state: "pending"
          repository: ${{ github.repository }}
          target_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          sha: ${{ env.SHA }}

      - name: Install docker CLI (client) in the job container
        shell: bash
        run: |
          set -euxo pipefail
          source /etc/os-release
          echo "ID_LIKE=${ID_LIKE:-}"
          if [[ "${ID_LIKE:-}" == *rhel* ]]; then
            echo "RHEL-like distro"
            dnf -y install dnf-plugins-core ca-certificates curl
            dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
            dnf -y install docker-ce-cli
          elif [[ "${ID_LIKE:-}" == *debian* ]]; then
            apt-get update
            apt-get install -y --no-install-recommends docker.io ca-certificates
          fi
          docker version
          docker ps

      - name: 'Checkout package-testing: "${{ inputs.package_testing_branch }}"'
        uses: actions/checkout@v4
        with:
          repository: Percona-QA/package-testing
          ref: ${{ inputs.package_testing_branch }}

      - name: 'Convert choices'
        run: |
          ### pmm-server docker image ###
          if [[ -z "${{ env.PMM_SERVER_IMAGE }}" ]]; then
            if [[ "${{ inputs.repository }}" = "dev-latest" ]]; then
              echo "PMM_SERVER_IMAGE=perconalab/pmm-server:3-dev-latest" >> $GITHUB_ENV
            fi
            if [[ "${{ inputs.repository }}" =~ "candidate" ]]; then
              rc_latest=$(wget -q "https://registry.hub.docker.com/v2/repositories/perconalab/pmm-client/tags?page_size=25&name=rc" -O - | jq -r .results[].name  | grep 3.*.*-rc$ | sort -V | tail -n1)
              echo "PMM_SERVER_IMAGE=perconalab/pmm-server:$rc_latest" >> $GITHUB_ENV
            fi
            if [[ "${{ inputs.repository }}" = "release" ]]; then
              r_latest=$(wget -q https://registry.hub.docker.com/v2/repositories/percona/pmm-client/tags -O - | jq -r .results[].name  | grep -v latest | sort -V | tail -n1)
              echo "PMM_SERVER_IMAGE=percona/pmm-server:$r_latest" >> $GITHUB_ENV
            fi
          fi
          echo "${{ env.PMM_SERVER_IMAGE }}"
          
          ### pmm2-client repository ### 
          if [[ "${{ inputs.repository }}" = "dev-latest" ]]; then
            echo "REPO=experimental" >> $GITHUB_ENV
          fi
          if [[ "${{ inputs.repository }}" =~ "candidate" ]]; then
            echo "REPO=testing" >> $GITHUB_ENV
            echo "EXPECTED_VERSION=$(echo ${{ inputs.expected_version }} | awk -F'-' '{print $1}')" >> $GITHUB_ENV
            echo "expected version is ${{ env.EXPECTED_VERSION }}"
          fi
          if [[ "${{ inputs.expected_version}}" = "3-dev-latest" ]]; then
            DEV_VERSION=$(wget -q https://raw.githubusercontent.com/Percona-Lab/pmm-submodules/v3/VERSION -O -)
            echo "EXPECTED_VERSION=$DEV_VERSION" >> $GITHUB_ENV
          elif [[ "${{ inputs.expected_version}}" = "pmm3-rc" ]]; then
            RC_VERSION=$(wget -q "https://registry.hub.docker.com/v2/repositories/perconalab/pmm-client/tags?page_size=25&name=rc" -O - | jq -r .results[].name  | grep 3.*.*-rc$ | sort -V | tail -n1)
            echo "EXPECTED_VERSION=$RC_VERSION" >> $GITHUB_ENV
          fi
          echo "repo=${{ env.REPO }}"
          
      - name: 'Setup "${{ env.PMM_SERVER_IMAGE }}"'
        run: |
          docker create -v /srv --name pmm-server-data ${{ env.PMM_SERVER_IMAGE }}
          docker run -d -e PMM_ENABLE_NOMAD=1 -e PMM_ENABLE_INTERNAL_PG_QAN=1 -e PMM_PUBLIC_ADDRESS=127.0.0.1  -p 80:8080 -p 443:8443 -p 9000:9000 -p 4647:4647 \
            --volumes-from pmm-server-data --name pmm-server --restart always ${{ env.PMM_SERVER_IMAGE }}

      - name: "Setup tools"
        shell: bash
        run: |
          set -euo pipefail
          DISTRIBUTION=$(cat /proc/version)
          echo "$DISTRIBUTION"
          if [[ "${DISTRIBUTION}" =~ "Debian" ]]; then
            apt-get update
            apt-get install -y apt-transport-https ca-certificates ansible curl
            apt update
          fi

      - name: "Wait for PMM Server to be healthy"
        run: |
          timeout 240 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' http://127.0.0.1/v1/readyz)" != "200" ]]; do sleep 2; done' || false

      - name: "Create vagrantfile"
        working-directory: ./
        run: |
          pwd
          # mkdir -p ~/test-vm/
          # cat > ~/test-vm/Vagrantfile <<EOF
          cat > Vagrantfile <<EOF
          Vagrant.require_version ">= 1.7.0"
          Vagrant.configure(2) do |config|
            config.vm.box = "${{ env.VM_BOX }}"
            ${{ contains(env.VM_BOX, 'debian10') && 'config.vbguest.auto_update = true' }}
            config.ssh.insert_key = false
            config.vm.define :CLIENT_TEST do |t|
            end

            config.vm.synced_folder "${{ github.workspace }}/", "/pmm/package-testing/"
            config.vm.provision "shell", privileged: true, inline: <<-SHELL
              ## Set environment variables...
              export PMM_SERVER_IP=192.168.122.1:443
              export METRICS_MODE=${{ env.METRICS_MODE }}
              export PMM_VERSION="${{ env.EXPECTED_VERSION }}"
              echo $PMM_VERSION
              if [[ "${{ env.TARBALL_LINK }}" != "null" ]]; then
                export TARBALL_LINK="${{ env.TARBALL_LINK }}"
              fi
              export install_repo=${{ env.REPO }}
              export install_package=${{ env.INSTALL_PACKAGE }}
              
              if [[ "${{ env.VM_BOX }}" =~ "oracle" ]]; then
                sudo dnf install -y epel-release
                sudo dnf -y update
                sudo dnf install -y ansible-core git wget dpkg
              fi
              if [[ "${{ env.VM_BOX }}" =~ "al2023" ]]; then
                sudo dnf -y update
                sudo dnf install -y ansible git wget tar
              fi
              if [[ "${{ env.VM_BOX }}" =~ "debian" ]]; then
                sudo apt-get install -y dirmngr gnupg2
                echo "deb http://ppa.launchpad.net/ansible/ansible/ubuntu trusty main" | sudo tee -a /etc/apt/sources.list > /dev/null
                sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 93C4A3FD7BB9C367
                sudo apt update -y
                sudo apt-get install -y ansible git wget
              fi
              if [[ "${{ env.VM_BOX }}" =~ "ubuntu" ]]; then
                sudo apt update -y
                sudo apt install -y software-properties-common
                sudo apt-add-repository --yes --update ppa:ansible/ansible
                sudo apt-get install -y ansible git wget
              fi
              if [[ "${{ env.VM_BOX }}" =~ "oracle" ]]; then
                sudo dnf -y install dnf-plugins-core
                sudo dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo
                sudo dnf -y install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
                sudo systemctl enable --now docker
              fi
              if [[ "${{ env.VM_BOX }}" =~ "almalinux" ]]; then
                sudo dnf install 'dnf-command(config-manager)'
                sudo dnf config-manager --set-enabled crb
                sudo dnf install -y epel-release
                sudo dnf update -y
                sudo dnf install -y ansible-core git wget
              fi
              cd /pmm/package-testing/playbooks
              ANSIBLE_CALLBACK_RESULT_FORMAT=yaml ansible-playbook -vv --connection=local --inventory 127.0.0.1, --limit 127.0.0.1 ${{ env.PLAYBOOK }}.yml
              SHELL
          end

          EOF

      - name: "Run (${{ contains(env.TARBALL, 'PR-') && 'feature build' || inputs.repository }})${{ inputs.playbook }} test on ${{ inputs.os }}"
        working-directory: ./
        run: sudo vagrant up --provider=libvirt

      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: pmm-summary-${{inputs.os}}-${{ inputs.playbook }}
          path: |
            ${{ github.workspace }}/pmm-summary.zip

      - name: "Create status check"
        uses: percona/gh-action-github-status-action@v1
        if: ${{ env.SHA != 'null' && always() }}
        continue-on-error: true
        with:
          authToken: ${{ secrets.GITHUB_TOKEN }}
          context: "${{ inputs.test_name }} Package test"
          description: "Test execution ${{ job.status }}"
          state: ${{ job.status }}
          repository: ${{ github.repository }}
          target_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          sha: ${{ env.SHA }}

      #- name: Setup tmate session  on failure
      #  if: ${{ failure() }}
      #  uses: percona/gh-action-action-tmate@v2
