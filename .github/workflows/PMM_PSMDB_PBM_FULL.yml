# PSMDB/PBM scenarios; assets live under qa-integration/ inside percona/pmm-qa (migrated from Percona-Lab/qa-integration).
name: PMM_PSMDB_PBM_FULL

on:
  workflow_dispatch:
    inputs:
      pmm_qa_branch:
        description: 'Git ref of percona/pmm-qa to run (must contain qa-integration/)'
        default: 'main'
        required: false
        type: string
      pmm_version:
        description: 'pmm-client version string (e.g. pmm3-rc)'
        default: '3-dev-latest'
        required: false
        type: string
      pmm_image:
        description: 'pmm-server docker image'
        default: 'perconalab/pmm-server:3-dev-latest'
        required: false
        type: string

  workflow_call:
    inputs:
      pmm_qa_branch:
        required: false
        type: string
      pmm_version:
        required: false
        type: string
      pmm_image:
        required: false
        type: string

jobs:
  test_replica_set:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        psmdb: ['6.0', '7.0', '8.0']
    env:
      PMM_CLIENT_VERSION: ${{ inputs.pmm_version || github.event.inputs.pmm_version || '3-dev-latest' }}
      PMM_IMAGE: ${{ inputs.pmm_image || github.event.inputs.pmm_image || 'perconalab/pmm-server:3-dev-latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pmm_qa_branch || github.event.inputs.pmm_qa_branch || 'main' }}
      - name: Test RS with PSMDB ${{ matrix.psmdb }}
        run: |
          PSMDB_VERSION=${{ matrix.psmdb }} ./start-rs.sh
        working-directory: ./qa-integration/pmm_psmdb-pbm_setup

  test_sharded_cluster:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        psmdb: ['6.0', '7.0', '8.0']
    env:
      PMM_CLIENT_VERSION: ${{ inputs.pmm_version || github.event.inputs.pmm_version || '3-dev-latest' }}
      PMM_IMAGE: ${{ inputs.pmm_image || github.event.inputs.pmm_image || 'perconalab/pmm-server:3-dev-latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pmm_qa_branch || github.event.inputs.pmm_qa_branch || 'main' }}
      - name: Test sharded with PSMDB ${{ matrix.psmdb }}
        run: |
          PSMDB_VERSION=${{ matrix.psmdb }} ./start-sharded.sh
        working-directory: ./qa-integration/pmm_psmdb-pbm_setup

  test_diff_auth:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        psmdb: ['6.0', '7.0', '8.0']
    env:
      PMM_CLIENT_VERSION: ${{ inputs.pmm_version || github.event.inputs.pmm_version || '3-dev-latest' }}
      PMM_IMAGE: ${{ inputs.pmm_image || github.event.inputs.pmm_image || 'perconalab/pmm-server:3-dev-latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pmm_qa_branch || github.event.inputs.pmm_qa_branch || 'main' }}
      - name: Test auth with PSMDB ${{ matrix.psmdb }}
        run: |
          PSMDB_VERSION=${{ matrix.psmdb }} ./test-auth.sh
        working-directory: ./qa-integration/pmm_psmdb_diffauth_setup
      - name: PMM Server container logs
        if: failure()
        run: |
          docker logs pmm-server || true
      - name: PSMDB Server container logs
        if: failure()
        run: |
          docker logs psmdb-server || true
