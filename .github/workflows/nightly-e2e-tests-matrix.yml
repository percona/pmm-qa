name: "Nightly E2E tests Matrix (remote PMM Server)"
# Triggered by Jenkins (pmm3-ui-tests-nightly-gha.groovy) once the PMM Server
# is up. Fans out one job per (client setup, tag) pair so each worker only
# runs the tests it has data for.

on:
  workflow_dispatch:
    inputs:
      pmm_server_address:
        description: "Hostname/IP of the externally-managed PMM Server (no scheme). Example: 12.34.56.78"
        required: true
        type: string
      admin_password:
        description: "Admin password configured on the remote PMM Server"
        required: false
        default: 'admin'
        type: string
      pmm_qa_branch:
        description: "Branch for pmm-qa repository to checkout"
        required: false
        default: 'main'
        type: string
      pmm_client_version:
        description: "PMM Client version (latest-tarball|pmm3-rc|x.xx.x|https://...)"
        required: false
        default: 'latest-tarball'
        type: string
      pmm_server_image:
        description: "PMM Server docker container version (image-name:version-tag)"
        required: false
        default: 'perconalab/pmm-server:3-dev-latest'
        type: string
      launchable_confidence:
        description: "Launchable subset confidence percentage"
        required: false
        default: '100%'
        type: string

  workflow_call:
    inputs:
      pmm_server_address:
        required: true
        type: string
      admin_password:
        required: false
        default: 'admin'
        type: string
      pmm_qa_branch:
        required: false
        default: 'main'
        type: string
      pmm_client_version:
        required: false
        default: 'latest-tarball'
        type: string
      pmm_server_image:
        required: false
        default: 'perconalab/pmm-server:3-dev-latest'
        type: string
      launchable_confidence:
        required: false
        default: '100%'
        type: string
    secrets:
      LAUNCHABLE_TOKEN:
        required: false

jobs:
  ps:
    name: "PS"
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs-remote.yml
    secrets: inherit
    with:
      pmm_server_address: ${{ inputs.pmm_server_address }}
      admin_password: ${{ inputs.admin_password || 'admin' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'main' }}
      pmm_client_version: ${{ inputs.pmm_client_version || 'latest-tarball' }}
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      setup_services: '--database ps,SETUP_TYPE=replication --database ps,SETUP_TYPE=gr'
      tags_for_tests: '@dashboard-percona-server'
      workers: 1
      launchable_confidence: ${{ inputs.launchable_confidence || '100%' }}

  mysql:
    name: "MySQL"
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs-remote.yml
    secrets: inherit
    with:
      pmm_server_address: ${{ inputs.pmm_server_address }}
      admin_password: ${{ inputs.admin_password || 'admin' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'main' }}
      pmm_client_version: ${{ inputs.pmm_client_version || 'latest-tarball' }}
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      setup_services: '--database mysql'
      tags_for_tests: '@dashboard-mysql'
      workers: 1
      launchable_confidence: ${{ inputs.launchable_confidence || '100%' }}

  pxc:
    name: "PXC"
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs-remote.yml
    secrets: inherit
    with:
      pmm_server_address: ${{ inputs.pmm_server_address }}
      admin_password: ${{ inputs.admin_password || 'admin' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'main' }}
      pmm_client_version: ${{ inputs.pmm_client_version || 'latest-tarball' }}
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      setup_services: '--database pxc'
      tags_for_tests: '@dashboard-pxc'
      workers: 1
      launchable_confidence: ${{ inputs.launchable_confidence || '100%' }}

  ps_myrocks:
    name: "PS MyRocks"
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs-remote.yml
    secrets: inherit
    with:
      pmm_server_address: ${{ inputs.pmm_server_address }}
      admin_password: ${{ inputs.admin_password || 'admin' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'main' }}
      pmm_client_version: ${{ inputs.pmm_client_version || 'latest-tarball' }}
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      setup_services: '--database ps,QUERY_SOURCE=slowlog,MY_ROCKS=true'
      tags_for_tests: '@dashboard-ps-myrocks'
      workers: 1
      launchable_confidence: ${{ inputs.launchable_confidence || '100%' }}

  psmdb:
    name: "PSMDB replicaset and PXC"
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs-remote.yml
    secrets: inherit
    with:
      pmm_server_address: ${{ inputs.pmm_server_address }}
      admin_password: ${{ inputs.admin_password || 'admin' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'main' }}
      pmm_client_version: ${{ inputs.pmm_client_version || 'latest-tarball' }}
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      setup_services: '--database psmdb,SETUP_TYPE=pss --database pxc'
      tags_for_tests: '@dashboard-psmdb|@dashboard-pxc'
      workers: 1
      launchable_confidence: ${{ inputs.launchable_confidence || '100%' }}

  psmdb_sharded:
    name: "PSMDB sharded"
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs-remote.yml
    secrets: inherit
    with:
      pmm_server_address: ${{ inputs.pmm_server_address }}
      admin_password: ${{ inputs.admin_password || 'admin' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'main' }}
      pmm_client_version: ${{ inputs.pmm_client_version || 'latest-tarball' }}
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      setup_services: '--database psmdb,SETUP_TYPE=sharding'
      tags_for_tests: '@dashboard-psmdb-sharded'
      workers: 1
      launchable_confidence: ${{ inputs.launchable_confidence || '100%' }}

  pdpgsql:
    name: "PDPGSQL"
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs-remote.yml
    secrets: inherit
    with:
      pmm_server_address: ${{ inputs.pmm_server_address }}
      admin_password: ${{ inputs.admin_password || 'admin' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'main' }}
      pmm_client_version: ${{ inputs.pmm_client_version || 'latest-tarball' }}
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      setup_services: '--database pdpgsql'
      tags_for_tests: '@dashboard-pdpgsql'
      workers: 1
      launchable_confidence: ${{ inputs.launchable_confidence || '100%' }}

  pdpgsql_patroni:
    name: "PDPGSQL Patroni"
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs-remote.yml
    secrets: inherit
    with:
      pmm_server_address: ${{ inputs.pmm_server_address }}
      admin_password: ${{ inputs.admin_password || 'admin' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'main' }}
      pmm_client_version: ${{ inputs.pmm_client_version || 'latest-tarball' }}
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      setup_services: '--database pdpgsql,SETUP_TYPE=patroni'
      tags_for_tests: '@dashboard-pdpgsql-patroni'
      workers: 1
      launchable_confidence: ${{ inputs.launchable_confidence || '100%' }}

  pgsql:
    name: "PGSQL"
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs-remote.yml
    secrets: inherit
    with:
      pmm_server_address: ${{ inputs.pmm_server_address }}
      admin_password: ${{ inputs.admin_password || 'admin' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'main' }}
      pmm_client_version: ${{ inputs.pmm_client_version || 'latest-tarball' }}
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      setup_services: '--database pgsql'
      tags_for_tests: '@dashboard-pgsql'
      workers: 1
      launchable_confidence: ${{ inputs.launchable_confidence || '100%' }}

  valkey:
    name: "Valkey"
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs-remote.yml
    secrets: inherit
    with:
      pmm_server_address: ${{ inputs.pmm_server_address }}
      admin_password: ${{ inputs.admin_password || 'admin' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'main' }}
      pmm_client_version: ${{ inputs.pmm_client_version || 'latest-tarball' }}
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      setup_services: '--database valkey'
      tags_for_tests: '@dashboard-valkey'
      workers: 1
      launchable_confidence: ${{ inputs.launchable_confidence || '100%' }}

  qan:
    name: "QAN"
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs-remote.yml
    secrets: inherit
    # if: ${{ always() }}
    needs: [ps, mysql, pxc, ps_myrocks, psmdb, psmdb_sharded, pdpgsql, pdpgsql_patroni, pgsql, valkey]
    with:
      pmm_server_address: ${{ inputs.pmm_server_address }}
      admin_password: ${{ inputs.admin_password || 'admin' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'main' }}
      pmm_client_version: ${{ inputs.pmm_client_version || 'latest-tarball' }}
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      setup_services: '--help'
      tags_for_tests: '@qan'
      workers: 4
      launchable_confidence: ${{ inputs.launchable_confidence || '100%' }}

  generic:
    name: "Generic (inventory/settings/permissions/OS/VM/...)"
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs-remote.yml
    secrets: inherit
    # if: ${{ always() }}
    needs: [ps, mysql, pxc, ps_myrocks, psmdb, psmdb_sharded, pdpgsql, pdpgsql_patroni, pgsql, valkey]
    with:
      pmm_server_address: ${{ inputs.pmm_server_address }}
      admin_password: ${{ inputs.admin_password || 'admin' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'main' }}
      pmm_client_version: ${{ inputs.pmm_client_version || 'latest-tarball' }}
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      setup_services: '--help'
      tags_for_tests: '@nightly-generic'
      workers: 4
      launchable_confidence: ${{ inputs.launchable_confidence || '100%' }}
