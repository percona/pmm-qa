name:  PMM3 Ui-tests matrix

on:
  workflow_dispatch:
    inputs:
      pmm_ui_tests_branch:
        description: 'pmm-ui-tests repository branch(CLI tests)'
        default: 'v3'
        required: false
        type: string
      pmm_qa_branch:
        description: 'qa-integration repository branch(for setup)'
        default: 'v3'
        required: false
        type: string
      pmm_server_image:
        description: 'PMM Server docker image'
        default: 'perconalab/pmm-server:3-dev-latest'
        required: true
        type: string
      pmm_client_image:
        description: 'pmm-client docker image'
        default: 'perconalab/pmm-client:3-dev-latest'
        required: false
        type: string
      pmm_client_version:
        description: 'PMM Client version (3-dev-latest|pmm3-rc|x.xx.x|https...)'
        default: '3-dev-latest'
        required: false
        type: string
      sha:
        description: "SHA (leave default if running manually)"
        default: 'null'
        required: false
        type: string

jobs:
  fb-e2-suite:
    name: FB e2e tests
    uses: ./.github/workflows/fb-e2e-suite.yml
    secrets: inherit
    with:
      pmm_ui_tests_branch: ${{ inputs.pmm_ui_tests_branch }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch }}
      pmm_server_image: ${{ inputs.pmm_server_image }}
      pmm_client_image: ${{ inputs.pmm_client_image }}
      pmm_client_version: ${{ inputs.pmm_client_version }}
      sha: ${{ inputs.sha || github.event.pull_request.head.sha ||  'null' }}

  portal:
    name: Portal
    uses: ./.github/workflows/runner-e2e-tests-playwright.yml
    secrets: inherit
    with:
      pmm_ui_tests_branch: ${{ github.event.inputs.pmm_ui_tests_branch || github.head_ref || 'main '}}
      pmm_test_flag: '@portal'
      pmm_server_version: ${{ github.event.inputs.pmm_server_version || 'perconalab/pmm-server:dev-latest' }}
      pmm_client_version: ${{ github.event.inputs.pmm_client_version || 'dev-latest' }}
      setup_services: ''
      pmm_qa_branch: ${{ github.event.inputs.pmm_qa_branch || 'main' }}

  inventory:
    name: Inventory
    uses: ./.github/workflows/runner-e2e-tests-playwright.yml
    secrets: inherit
    with:
      pmm_ui_tests_branch: ${{ github.event.inputs.pmm_ui_tests_branch || github.head_ref || 'main '}}
      pmm_test_flag: '@inventory'
      pmm_server_version: ${{ github.event.inputs.pmm_server_version || 'perconalab/pmm-server:dev-latest' }}
      pmm_client_version: ${{ github.event.inputs.pmm_client_version || 'dev-latest' }}
      setup_services: '--addclient=modb,1 --addclient=ps,1 --addclient=pdpgsql,1'
      pmm_qa_branch: ${{ github.event.inputs.pmm_qa_branch || 'main' }}

  exporters:
    name: Integrated Alerting tests
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs.yml
    secrets: inherit
    with:
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      pmm_client_image: ${{ inputs.pmm_client_image || 'perconalab/pmm-client:3-dev-latest' }}
      pmm_client_version: ${{ inputs.pmm_client_version || '3-dev-latest' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'v3' }}
      pmm_ui_tests_branch: ${{ inputs.pmm_ui_tests_branch || 'v3' }}
      sha: ${{ inputs.sha || github.event.pull_request.head.sha ||  'null' }}
      setup_services: '--database mysql'
      tags_for_tests: '@ia'

  settings-cli:
    name: Settings and Cli tests
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs.yml
    secrets: inherit
    with:
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      pmm_client_image: ${{ inputs.pmm_client_image || 'perconalab/pmm-client:3-dev-latest' }}
      pmm_client_version: ${{ inputs.pmm_client_version || '3-dev-latest' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'v3' }}
      pmm_ui_tests_branch: ${{ inputs.pmm_ui_tests_branch || 'v3' }}
      sha: ${{ inputs.sha || github.event.pull_request.head.sha ||  'null' }}
      setup_services: '--database ps'
      tags_for_tests: '@settings|@cli'

  ssl-mysql:
    name: SSL/TLS tests remote mysql tests
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs.yml
    secrets: inherit
    with:
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      pmm_client_image: ${{ inputs.pmm_client_image || 'perconalab/pmm-client:3-dev-latest' }}
      pmm_client_version: ${{ inputs.pmm_client_version || '3-dev-latest' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'v3' }}
      pmm_ui_tests_branch: ${{ inputs.pmm_ui_tests_branch || 'v3' }}
      sha: ${{ inputs.sha || github.event.pull_request.head.sha ||  'null' }}
      setup_services: '--database SSL_MYSQL=8.0 --database SSL_MYSQL=5.7'
      tags_for_tests: '@ssl-mysql'

  ssl-mongo:
    name: SSL/TLS tests remote mongo tests
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs.yml
    secrets: inherit
    with:
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      pmm_client_image: ${{ inputs.pmm_client_image || 'perconalab/pmm-client:3-dev-latest' }}
      pmm_client_version: ${{ inputs.pmm_client_version || '3-dev-latest' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'v3' }}
      pmm_ui_tests_branch: ${{ inputs.pmm_ui_tests_branch || 'v3' }}
      sha: ${{ inputs.sha || github.event.pull_request.head.sha ||  'null' }}
      setup_services: '--database SSL_PSMDB=14'
      tags_for_tests: '@ssl-mongo'

  ssl-postgres:
    name: SSL/TLS tests remote postgres tests
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs.yml
    secrets: inherit
    with:
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      pmm_client_image: ${{ inputs.pmm_client_image || 'perconalab/pmm-client:3-dev-latest' }}
      pmm_client_version: ${{ inputs.pmm_client_version || '3-dev-latest' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'v3' }}
      pmm_ui_tests_branch: ${{ inputs.pmm_ui_tests_branch || 'v3' }}
      sha: ${{ inputs.sha || github.event.pull_request.head.sha ||  'null' }}
      setup_services: '--database SSL_PDPGSQL=14'
      tags_for_tests: '@ssl-postgres'

  experimental:
    name: Experimental features tests
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs.yml
    secrets: inherit
    with:
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      pmm_client_image: ${{ inputs.pmm_client_image || 'perconalab/pmm-client:3-dev-latest' }}
      pmm_client_version: ${{ inputs.pmm_client_version || '3-dev-latest' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'v3' }}
      pmm_ui_tests_branch: ${{ inputs.pmm_ui_tests_branch || 'v3' }}
      sha: ${{ inputs.sha || github.event.pull_request.head.sha ||  'null' }}
      setup_services: '--database pgsql'
      tags_for_tests: '@experimental'

  disconnect:
    name: pmm-server Disconnect tests
    uses: ./.github/workflows/runner-e2e-tests-codeceptjs.yml
    secrets: inherit
    with:
      pmm_server_image: ${{ inputs.pmm_server_image || 'perconalab/pmm-server:3-dev-latest' }}
      pmm_client_image: ${{ inputs.pmm_client_image || 'perconalab/pmm-client:3-dev-latest' }}
      pmm_client_version: ${{ inputs.pmm_client_version || '3-dev-latest' }}
      pmm_qa_branch: ${{ inputs.pmm_qa_branch || 'v3' }}
      pmm_ui_tests_branch: ${{ inputs.pmm_ui_tests_branch || 'v3' }}
      sha: ${{ inputs.sha || github.event.pull_request.head.sha ||  'null' }}
      setup_services: '--database psmdb'
      tags_for_tests: '@disconnect'

