name: "RC Testing Suite"

on:
  workflow_dispatch:
    inputs:
      rc_version:
        description: 'Numeric RC version, e.g. 3.7.0 (images perconalab/pmm-server:<value>-rc and perconalab/pmm-client:<value>-rc;)'
        required: true
        type: string
      pmm_client_tarball_ol8:
        description: 'RC OL8 pmm-client dynamic tarball URL (from client autobuild)'
        required: true
        type: string
      pmm_client_tarball_ol9:
        description: 'RC OL9 pmm-client dynamic tarball URL (from client autobuild)'
        required: true
        type: string
      pmm_qa_branch:
        description: 'PMM QA branch'
        required: false
        default: 'main'
        type: string
      pxc_version:
        description: 'PMM_PROXYSQL: PXC version or VERSIONS URL'
        required: false
        default: '8.0'
        type: string
      pxc_glibc:
        description: 'PMM_PROXYSQL: glibc suffix (e.g. 2.35)'
        required: false
        default: '2.35'
        type: string
      pdpgsql_version:
        description: 'PMM_PDPGSQL: major version (15, 16, 17, …)'
        required: false
        default: '17'
        type: string

jobs:
  get_compat_versions:
    name: GA pmm-client tags (pmm-version-getter)
    uses: ./.github/workflows/pmm-version-getter.yml
    with:
      repository: 'release candidate'
      matrix_range: '5'

  plan:
    name: Compatibility matrix (percona/pmm-client)
    needs: get_compat_versions
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      compat_matrix: ${{ steps.pick.outputs.compat_matrix }}
    steps:
      - id: pick
        shell: bash
        env:
          VERSIONS_JSON: ${{ needs.get_compat_versions.outputs.version_matrix }}
        run: |
          set -euo pipefail
          n="$(echo "$VERSIONS_JSON" | jq 'length')"
          if [[ "$n" -lt 1 ]]; then
            echo '::error::pmm-version-getter returned no GA tags for compatibility (check Docker Hub).'
            exit 1
          fi
          compat_matrix_json="$(echo "$VERSIONS_JSON" | jq 'map({version: ., image: ("percona/pmm-client:" + .)})')"
          {
            echo "compat_matrix<<__COMPAT_MATRIX_EOF__"
            echo "$compat_matrix_json"
            echo "__COMPAT_MATRIX_EOF__"
          } >> "$GITHUB_OUTPUT"

  cli_integration_tests:
    name: CLI integration (pmm-cli-integration-tests)
    needs: plan
    uses: ./.github/workflows/integration-cli-tests.yml
    secrets:
      LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}
    with:
      pmm_qa_branch: ${{ inputs.pmm_qa_branch }}
      pmm_server_image: 'perconalab/pmm-server:${{ inputs.rc_version }}-rc'
      pmm_client_image: 'perconalab/pmm-client:${{ inputs.rc_version }}-rc'
      pmm_client_version: pmm3-rc

  compatibility_integration_tests:
    name: Compatibility CLI (${{ matrix.version }})
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.compat_matrix) }}
    uses: ./.github/workflows/integration-cli-tests.yml
    secrets:
      LAUNCHABLE_TOKEN: ${{ secrets.LAUNCHABLE_TOKEN }}
    with:
      pmm_qa_branch: ${{ inputs.pmm_qa_branch }}
      pmm_server_image: 'perconalab/pmm-server:${{ inputs.rc_version }}-rc'
      pmm_client_image: ${{ matrix.image }}
      pmm_client_version: ${{ matrix.version }}

  e2e_tests_matrix:
    name: E2E Tests Matrix (CodeceptJS)
    needs: plan
    uses: ./.github/workflows/e2e-tests-matrix.yml
    secrets: inherit
    with:
      pmm_server_image: 'perconalab/pmm-server:${{ inputs.rc_version }}-rc'
      pmm_client_image: 'perconalab/pmm-client:${{ inputs.rc_version }}-rc'
      pmm_client_version: pmm3-rc
      pmm_qa_branch: ${{ inputs.pmm_qa_branch }}

  helm_tests:
    name: pmm3-helm
    needs: plan
    uses: ./.github/workflows/helm-tests.yml
    secrets: inherit
    with:
      server_image: 'perconalab/pmm-server:${{ inputs.rc_version }}-rc'
      client_image: 'perconalab/pmm-client:${{ inputs.rc_version }}-rc'
      pmm_chart_branch: latest
      pmm_qa_branch: ${{ inputs.pmm_qa_branch }}

  gssapi_tests:
    name: GSSAPI Tests Matrix
    needs: plan
    uses: ./.github/workflows/gssapi-psmdb-tests-matrix.yml
    secrets: inherit
    with:
      pmm_server_image: 'perconalab/pmm-server:${{ inputs.rc_version }}-rc'
      pmm_client_image: 'perconalab/pmm-client:${{ inputs.rc_version }}-rc'
      pmm_qa_branch: ${{ inputs.pmm_qa_branch }}
      pmm_client_version_ol8: ${{ inputs.pmm_client_tarball_ol8 }}
      pmm_client_version_ol9: ${{ inputs.pmm_client_tarball_ol9 }}
      package_testing_branch: v3
      repository: 'release candidate'
      expected_version: ${{ inputs.rc_version }}

  qa_integration_psmdb_pbm_full:
    name: PMM_PSMDB_PBM_FULL
    needs: plan
    uses: ./.github/workflows/PMM_PSMDB_PBM_FULL.yml
    with:
      pmm_qa_branch: ${{ inputs.pmm_qa_branch }}
      pmm_version: pmm3-rc
      pmm_image: 'perconalab/pmm-server:${{ inputs.rc_version }}-rc'

  qa_integration_proxysql:
    name: PMM_PROXYSQL
    needs: plan
    uses: ./.github/workflows/PMM_PROXYSQL.yaml
    with:
      pmm_qa_branch: ${{ inputs.pmm_qa_branch }}
      pxc_version: ${{ inputs.pxc_version }}
      pxc_glibc: ${{ inputs.pxc_glibc }}
      pmm_server_image: 'perconalab/pmm-server:${{ inputs.rc_version }}-rc'
      pmm_client_version: pmm3-rc

  qa_integration_pdpgsql:
    name: PMM_PDPGSQL
    needs: plan
    uses: ./.github/workflows/PMM_PDPGSQL.yaml
    with:
      pmm_qa_branch: ${{ inputs.pmm_qa_branch }}
      pdpgsql_version: ${{ inputs.pdpgsql_version }}
      pmm_server_image: 'perconalab/pmm-server:${{ inputs.rc_version }}-rc'
      pmm_client_version: pmm3-rc
