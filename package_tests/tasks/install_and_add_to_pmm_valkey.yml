- name: Debug selected Valkey version
  debug:
    var: valkey_to_test

- name: Set password for valkey
  set_fact:
    valkey_password: "UfY9s73Gx~!?@#$%^&*(){}[]<>|/:;,.-_+="

- name: Enable Valkey repository
  include_tasks: ./enable_repo.yml
  vars:
    only: yes
    package: "{{ valkey_to_test }}"
    repository: "release"

- name: Install Valkey on Debian based systems
  shell: "{{item}}"
  with_items:
    - apt update
    - apt install -y percona-valkey-server percona-valkey-tools
  become: yes
  when: ansible_os_family == "Debian"

- name: Install Valkey on Red Hat based systems
  shell: dnf install -y valkey
  become: yes
  when: ansible_os_family == "RedHat"

- name: Start valkey@default service
  shell: systemctl start valkey@default
  become: yes
  register: valkey_start
  ignore_errors: yes
  when: ansible_os_family == "RedHat"

- name: Show systemctl status if start failed
  shell: systemctl status valkey@default.service --no-pager -l
  become: yes
  register: valkey_status
  ignore_errors: yes
  when: ansible_os_family == "RedHat" and valkey_start is failed

- name: Print systemctl status
  debug:
    var: valkey_status.stdout_lines
  ignore_errors: yes
  when: ansible_os_family == "RedHat" and valkey_start is failed

- name: Show journalctl for valkey@default if start failed
  shell: journalctl -u valkey@default.service -n 100 --no-pager
  become: yes
  register: valkey_journal
  ignore_errors: yes
  when: ansible_os_family == "RedHat" and valkey_start is failed

- name: Print journalctl output
  debug:
    var: valkey_journal.stdout_lines
  ignore_errors: yes
  when: ansible_os_family == "RedHat" and valkey_start is failed

- name: Show valkey's own log file if start failed
  shell: cat /var/log/valkey/default/*.log 2>/dev/null || echo "no log file found"
  become: yes
  register: valkey_log
  ignore_errors: yes
  when: ansible_os_family == "RedHat" and valkey_start is failed

- name: Print valkey log
  debug:
    var: valkey_log.stdout_lines
  when: ansible_os_family == "RedHat" and valkey_start is failed

- name: Check ownership/permissions of valkey log dir
  shell: ls -la /var/log/valkey/ /var/log/valkey/default/ 2>&1
  become: yes
  register: valkey_logdir
  ignore_errors: yes
  when: ansible_os_family == "RedHat" and valkey_start is failed

- name: Print log dir listing
  debug:
    var: valkey_logdir.stdout_lines
  when: ansible_os_family == "RedHat" and valkey_start is failed

- name: Check SELinux status and denials
  shell: |
    getenforce
    echo "---"
    ausearch -m avc -ts recent 2>&1 | grep -i valkey || echo "no relevant AVC denials found"
  become: yes
  register: valkey_selinux
  ignore_errors: yes
  when: ansible_os_family == "RedHat" and valkey_start is failed

- name: Print SELinux diagnostics
  debug:
    var: valkey_selinux.stdout_lines
  when: ansible_os_family == "RedHat" and valkey_start is failed

- name: Check what log path the config actually specifies
  shell: grep -i '^logfile' /etc/valkey/default.conf /etc/valkey/includes/*.conf 2>/dev/null || echo "no logfile directive found (may log to stdout by default)"
  become: yes
  register: valkey_conf_logpath
  ignore_errors: yes
  when: ansible_os_family == "RedHat" and valkey_start is failed

- name: Print configured log path
  debug:
    var: valkey_conf_logpath.stdout_lines
  when: ansible_os_family == "RedHat" and valkey_start is failed

- name: Fail the play now that diagnostics are captured
  fail:
    msg: "valkey@default failed to start — see systemctl/journalctl output above"
  when: ansible_os_family == "RedHat" and valkey_start is failed

- name: Set password for valkey
  shell: valkey-cli CONFIG SET requirepass '{{ valkey_password }}'
  become: yes

- name: Add valkey instance for monitoring
  command: >-
    pmm-admin add valkey {{ port_flag if port_flag is defined else '' }} --username=default --password="{{ valkey_password }}" --service-name={{ valkey_service_name }}
    {{ '' if agent_password is not defined or '/agent_id/' in agent_password else '--agent-password=%s' | format(agent_password) }}

- name: "Validate pmm-admin list output contains 'MySQL'"
  include_tasks: ./verify_pmm-admin_list_contains.yml
  vars:
    expected: "Valkey"

- name: "Wait for 'mysqld_exporter' is Running"
  include_tasks: ./wait_exporter_is_running.yml
  vars:
    process_name: "valkey_exporter"
