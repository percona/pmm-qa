version: '3.7'

services:
  pmm-server-1:
    container_name: pmm-server-1
    image: ${DOCKER_VERSION:-perconalab/pmm-server:3-dev-latest}
    platform: linux/amd64
    ports:
      - "2553:8443"
      - "8085:8080"
    environment:
      - PMM_DEBUG=1
    networks:
      - docker-client-check

  pmm-client:
    container_name: pmm-client-1
    image: ${CLIENT_DOCKER_VERSION:-perconalab/pmm-client:3-dev-latest}
    platform: linux/amd64
    environment:
      - PMM_AGENT_SERVER_ADDRESS=pmm-server-1:8443
      - PMM_AGENT_SERVER_USERNAME=admin
      - PMM_AGENT_SERVER_PASSWORD=admin
      - PMM_AGENT_SERVER_INSECURE_TLS=1
      - PMM_AGENT_SETUP=1
      - PMM_AGENT_SETUP_FORCE=1
      - PMM_AGENT_CONFIG_FILE=/usr/local/percona/pmm/config/pmm-agent.yaml
    depends_on:
      pmm-server-1:
        condition: service_healthy
      ps:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - docker-client-check

  ps:
    container_name: ps-1
    image: percona:8.0
    platform: linux/amd64
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_USER=pmm
      - MYSQL_PASSWORD=pmm-pass
      - PMM_AGENT_SERVER_ADDRESS=pmm-server-1:8443
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - docker-client-check

  mongodb:
    container_name: psmdb-1
    image: percona/percona-server-mongodb:7.0
    platform: linux/amd64
    environment:
      - PMM_AGENT_SERVER_ADDRESS=pmm-server-1:8443
      - MONGO_INITDB_ROOT_USERNAME=pmm
      - MONGO_INITDB_ROOT_PASSWORD=pmm-pass
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "pmm", "-p", "pmm-pass"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - docker-client-check

  postgres:
    container_name: pdpgsql-1
    image: percona/percona-distribution-postgresql:16
    platform: linux/amd64
    environment:
      - POSTGRES_USER=pmm
      - POSTGRES_PASSWORD=pmm-pass
      - PMM_AGENT_SERVER_ADDRESS=pmm-server-1:8443
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmm"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - docker-client-check

networks:
  docker-client-check:
