storage:
  dbPath: /var/lib/mongo
  engine: inMemory
  inMemory:
    engineConfig:
      inMemorySizeGB: 1
      statisticsLogDelaySecs: 0

systemLog:
  destination: syslog

net:
  port: 27017
  bindIp: 0.0.0.0

replication:
  replSetName: "rs"

operationProfiling:
  mode: all
  slowOpThresholdMs: 1

security:
  keyFile: /etc/keyfile
  authorization: enabled
setParameter:
  authenticationMechanisms: SCRAM-SHA-1,GSSAPI
