version: "3"
services:
  build_member:
    image: replica_member/local
    build:
      dockerfile: ./Dockerfile
      context: .
      args:
        - REPO=${REPO:-release}
        - PMM_REPO=${PMM_REPO:-experimental}
        - PBM_VERSION=${PBM_VERSION:-2.9.1-1}
        - PSMDB_VERSION=${PSMDB_VERSION:-latest}
        - PMM_CLIENT_VERSION=${PMM_CLIENT_VERSION:-3-dev-latest}
    command: /bin/bash

  rs101:
    depends_on:
      - build_member
    image: replica_member/local
    volumes:
      - ./conf/pbm:/etc/pbm
      - ./conf/mongod-rs1:/etc/mongod
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    cgroup: host
    environment:
      - "PBM_MONGODB_URI=mongodb://${PBM_USER:-pbm}:${PBM_PASS:-pbmpass}@127.0.0.1:27017"
      - "PMM_AGENT_SERVER_ADDRESS=${PMM_SERVER_CONTAINER_ADDRESS:-pmm-server:8443}"
      - "PMM_AGENT_SERVER_USERNAME=admin"
      - "PMM_AGENT_SERVER_PASSWORD=${ADMIN_PASSWORD:-password}"
      - "PMM_AGENT_SERVER_INSECURE_TLS=1"
    container_name: rs101
    hostname: rs101
    ports:
      - "27027:27017"
    networks:
      - pmm-qa
      - pmm-ui-tests1
      - qa-integration
      - pmm-ui-tests3
      - pmm-ui-tests2

  rs102:
    depends_on:
      - build_member
    image: replica_member/local
    volumes:
      - ./conf/pbm:/etc/pbm
      - ./conf/mongod-rs1:/etc/mongod
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    cgroup: host
    environment:
      - "PBM_MONGODB_URI=mongodb://${PBM_USER:-pbm}:${PBM_PASS:-pbmpass}@127.0.0.1:27017"
      - "PMM_AGENT_SERVER_ADDRESS=${PMM_SERVER_CONTAINER_ADDRESS:-pmm-server:8443}"
      - "PMM_AGENT_SERVER_USERNAME=admin"
      - "PMM_AGENT_SERVER_PASSWORD=${ADMIN_PASSWORD:-password}"
      - "PMM_AGENT_SERVER_INSECURE_TLS=1"
    container_name: rs102
    hostname: rs102
    networks:
      - pmm-qa
      - pmm-ui-tests1
      - qa-integration
      - pmm-ui-tests3
      - pmm-ui-tests2

  rs103:
    depends_on:
      - build_member
    image: replica_member/local
    volumes:
      - ./conf/pbm:/etc/pbm
      - ./conf/mongod-rs1:/etc/mongod
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    cgroup: host
    environment:
      - "PBM_MONGODB_URI=mongodb://${PBM_USER:-pbm}:${PBM_PASS:-pbmpass}@127.0.0.1:27017"
      - "PMM_AGENT_SERVER_ADDRESS=${PMM_SERVER_CONTAINER_ADDRESS:-pmm-server:8443}"
      - "PMM_AGENT_SERVER_USERNAME=admin"
      - "PMM_AGENT_SERVER_PASSWORD=${ADMIN_PASSWORD:-password}"
      - "PMM_AGENT_SERVER_INSECURE_TLS=1"
    container_name: rs103
    hostname: rs103
    networks:
      - pmm-qa
      - pmm-ui-tests1
      - qa-integration
      - pmm-ui-tests3
      - pmm-ui-tests2

  rs201:
    depends_on:
      - build_member
    image: replica_member/local
    volumes:
      - ./conf/pbm:/etc/pbm
      - ./conf/mongod-rs2:/etc/mongod
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    cgroup: host
    environment:
      - "PBM_MONGODB_URI=mongodb://${PBM_USER:-pbm}:${PBM_PASS:-pbmpass}@127.0.0.1:27017"
      - "PMM_AGENT_SERVER_ADDRESS=${PMM_SERVER_CONTAINER_ADDRESS:-pmm-server:8443}"
      - "PMM_AGENT_SERVER_USERNAME=admin"
      - "PMM_AGENT_SERVER_PASSWORD=${ADMIN_PASSWORD:-password}"
      - "PMM_AGENT_SERVER_INSECURE_TLS=1"
    container_name: rs201
    hostname: rs201
    networks:
      - pmm-qa
      - pmm-ui-tests1
      - qa-integration
      - pmm-ui-tests3
      - pmm-ui-tests2

  rs202:
    depends_on:
      - build_member
    image: replica_member/local
    volumes:
      - ./conf/pbm:/etc/pbm
      - ./conf/mongod-rs2:/etc/mongod
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    cgroup: host
    environment:
      - "PBM_MONGODB_URI=mongodb://${PBM_USER:-pbm}:${PBM_PASS:-pbmpass}@127.0.0.1:27017"
      - "PMM_AGENT_SERVER_ADDRESS=${PMM_SERVER_CONTAINER_ADDRESS:-pmm-server:8443}"
      - "PMM_AGENT_SERVER_USERNAME=admin"
      - "PMM_AGENT_SERVER_PASSWORD=${ADMIN_PASSWORD:-password}"
      - "PMM_AGENT_SERVER_INSECURE_TLS=1"
    container_name: rs202
    hostname: rs202
    networks:
      - pmm-qa
      - pmm-ui-tests1
      - qa-integration
      - pmm-ui-tests3
      - pmm-ui-tests2

  rs203:
    depends_on:
      - build_member
    image: replica_member/local
    volumes:
      - ./conf/pbm:/etc/pbm
      - ./conf/mongod-rs2:/etc/mongod
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    cgroup: host
    environment:
      - "PBM_MONGODB_URI=mongodb://${PBM_USER:-pbm}:${PBM_PASS:-pbmpass}@127.0.0.1:27017"
      - "PMM_AGENT_SERVER_ADDRESS=${PMM_SERVER_CONTAINER_ADDRESS:-pmm-server:8443}"
      - "PMM_AGENT_SERVER_USERNAME=admin"
      - "PMM_AGENT_SERVER_PASSWORD=${ADMIN_PASSWORD:-password}"
      - "PMM_AGENT_SERVER_INSECURE_TLS=1"
    container_name: rs203
    hostname: rs203
    networks:
      - pmm-qa
      - pmm-ui-tests1
      - qa-integration
      - pmm-ui-tests3
      - pmm-ui-tests2

  rscfg01:
    depends_on:
      - build_member
    image: replica_member/local
    volumes:
      - ./conf/pbm:/etc/pbm
      - ./conf/mongod-cfg:/etc/mongod
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    cgroup: host
    environment:
      - "PBM_MONGODB_URI=mongodb://${PBM_USER:-pbm}:${PBM_PASS:-pbmpass}@127.0.0.1:27017"
      - "PMM_AGENT_SERVER_ADDRESS=${PMM_SERVER_CONTAINER_ADDRESS:-pmm-server:8443}"
      - "PMM_AGENT_SERVER_USERNAME=admin"
      - "PMM_AGENT_SERVER_PASSWORD=${ADMIN_PASSWORD:-password}"
      - "PMM_AGENT_SERVER_INSECURE_TLS=1"
    container_name: rscfg01
    hostname: rscfg01
    networks:
      - pmm-qa
      - pmm-ui-tests1
      - qa-integration
      - pmm-ui-tests3
      - pmm-ui-tests2

  rscfg02:
    depends_on:
      - build_member
    image: replica_member/local
    volumes:
      - ./conf/pbm:/etc/pbm
      - ./conf/mongod-cfg:/etc/mongod
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    cgroup: host
    environment:
      - "PBM_MONGODB_URI=mongodb://${PBM_USER:-pbm}:${PBM_PASS:-pbmpass}@127.0.0.1:27017"
      - "PMM_AGENT_SERVER_ADDRESS=${PMM_SERVER_CONTAINER_ADDRESS:-pmm-server:8443}"
      - "PMM_AGENT_SERVER_USERNAME=admin"
      - "PMM_AGENT_SERVER_PASSWORD=${ADMIN_PASSWORD:-password}"
      - "PMM_AGENT_SERVER_INSECURE_TLS=1"
    container_name: rscfg02
    hostname: rscfg02
    networks:
      - pmm-qa
      - pmm-ui-tests1
      - qa-integration
      - pmm-ui-tests3
      - pmm-ui-tests2

  rscfg03:
    depends_on:
      - build_member
    image: replica_member/local
    volumes:
      - ./conf/pbm:/etc/pbm
      - ./conf/mongod-cfg:/etc/mongod
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    cgroup: host
    environment:
      - "PBM_MONGODB_URI=mongodb://${PBM_USER:-pbm}:${PBM_PASS:-pbmpass}@127.0.0.1:27017"
      - "PMM_AGENT_SERVER_ADDRESS=${PMM_SERVER_CONTAINER_ADDRESS:-pmm-server:8443}"
      - "PMM_AGENT_SERVER_USERNAME=admin"
      - "PMM_AGENT_SERVER_PASSWORD=${ADMIN_PASSWORD:-password}"
      - "PMM_AGENT_SERVER_INSECURE_TLS=1"
    container_name: rscfg03
    hostname: rscfg03
    networks:
      - pmm-qa
      - pmm-ui-tests1
      - qa-integration
      - pmm-ui-tests3
      - pmm-ui-tests2

  mongos:
    image: replica_member/local
    container_name: mongos
    hostname: mongos
    ports:
        - "127.0.0.1:27017:27017"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./conf/datagen:/etc/datagen:ro
    privileged: true
    cgroup: host
    command: "mongos --keyFile=/etc/keyfile --configdb rscfg/rscfg01:27017,rscfg02:27017,rscfg03:27017 --port 27017 --bind_ip 0.0.0.0"
    networks:
      - pmm-qa
      - pmm-ui-tests1
      - qa-integration
      - pmm-ui-tests3
      - pmm-ui-tests2
    depends_on:
      - build_member
      - rscfg01
      - rscfg02
      - rscfg03

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9001:9000"
    networks:
      - pmm-qa
      - pmm-ui-tests1
      - qa-integration
      - pmm-ui-tests3
      - pmm-ui-tests2
    volumes:
      - backups:/backups
    environment:
      - "MINIO_ACCESS_KEY=minio1234"
      - "MINIO_SECRET_KEY=minio1234"
    command: server /backups

  createbucket:
    container_name: createbucket
    image: minio/mc
    networks:
      - pmm-qa
      - pmm-ui-tests1
      - qa-integration
      - pmm-ui-tests3
      - pmm-ui-tests2
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " sleep 5; /usr/bin/mc alias set myminio http://minio:9000 minio1234 minio1234; /usr/bin/mc mb myminio/bcp; exit 0; "

  test:
    build:
      dockerfile: ./Dockerfile-testinfra
      context: .
    environment:
      PMM_SERVER_CONTAINER_ADDRESS: ${PMM_SERVER_CONTAINER_ADDRESS:-pmm-server:8443}
    volumes:
      - ./test:/test
      - /var/run/docker.sock:/var/run/docker.sock:ro
    container_name: test
    hostname: test
    networks:
      - pmm-qa
      - pmm-ui-tests1
      - qa-integration
      - pmm-ui-tests3
      - pmm-ui-tests2

networks:
  qa-integration:
    external: true
  pmm-ui-tests1:
    external: true
    name: pmm-ui-tests_pmm-network
  pmm-ui-tests2:
    external: true
    name: pmm2-upgrade-tests_pmm-network
  pmm-ui-tests3:
    external: true
    name: pmm2-ui-tests_pmm-network
  pmm-qa:
    name: pmm-qa
    external: true

volumes:
  backups: null
